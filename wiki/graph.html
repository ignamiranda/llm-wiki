const TC={concept:"#5b9bd5",article:"#ed7d31",person:"#70ad47",synthesis:"#ffc000"};
const w=window.innerWidth,h=window.innerHeight;
document.getElementById("statsBar").innerHTML=
  `<div class="stat"><span class="stat-value">${GRAPH.nodes.length}</span><span class="stat-label">Nodes</span></div>`+
  `<div class="stat"><span class="stat-value">${GRAPH.edges.length}</span><span class="stat-label">Edges</span></div>`+
  `<div class="stat"><span class="stat-value">${GRAPH.nodes.filter(n=>n.isOrphan).length}</span><span class="stat-label">Orphans</span></div>`+
  `<div class="stat"><span class="stat-value">${GRAPH.nodes.filter(n=>n.isHub).length}</span><span class="stat-label">Hubs</span></div>`;

const tl={concept:"Concept",article:"Article",person:"Person",synthesis:"Synthesis"};
let lh="";for(const t of Object.keys(TC)){const c=GRAPH.nodes.filter(n=>n.type===t).length;lh+=`<div class="legend-item"><span class="legend-dot" style="background:${TC[t]}"></span><span class="legend-label">${tl[t]} <span>(${c})</span></span></div>`;}
document.getElementById("legend").innerHTML=lh;

const nm={};GRAPH.nodes.forEach(n=>{nm[n.id]=n;});
const svg=d3.select("#graph").append("svg").attr("width",w).attr("height",h);
const g=svg.append("g");
svg.call(d3.zoom().extent([[0,0],[w,h]]).scaleExtent([0.1,8]).on("zoom",e=>{g.attr("transform",e.transform);}));
const sim=d3.forceSimulation(GRAPH.nodes)
  .force("link",d3.forceLink(GRAPH.edges).id(d=>d.id).distance(60))
  .force("charge",d3.forceManyBody().strength(-200))
  .force("center",d3.forceCenter(w/2,h/2))
  .force("collision",d3.forceCollide().radius(d=>8+Math.min(d.incomingLinks,15)));
const link=g.append("g").selectAll("line").data(GRAPH.edges).join("line").attr("class","link").attr("stroke","#555").attr("stroke-width",0.8);
const node=g.append("g").selectAll("g").data(GRAPH.nodes).join("g").attr("class","node")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
node.append("circle").attr("r",d=>5+Math.min(d.incomingLinks,15)).attr("fill",d=>TC[d.type]||"#888");
node.append("text").attr("class","label").attr("dy",d=>5+Math.min(d.incomingLinks,15)+12).text(d=>d.title.length>25?d.title.substring(0,24)+"…":d.title);
const tip=document.getElementById("tooltip");
node.on("mouseover",(e,d)=>{const t=d.tags?.length?d.tags.map(t=>`<span class="tag">${t}</span>`).join(""):"";tip.style.display="block";tip.innerHTML=`<div class="title">${d.title}</div><div class="detail">Type: ${d.type} | Lang: ${d.language}</div><div class="detail">In: ${d.incomingLinks} | Out: ${d.outgoingLinks}</div>${t?`<div class="detail">Tags: ${t}</div>`:""}`;})
  .on("mousemove",e=>{tip.style.left=(e.pageX+14)+"px";tip.style.top=(e.pageY-10)+"px";})
  .on("mouseout",()=>{tip.style.display="none";});
sim.on("tick",()=>{link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);node.attr("transform",d=>`translate(${d.x},${d.y})`);});
</script>
